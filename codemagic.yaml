workflows:
  android-release:
    name: RoboCar Android Build
    max_build_duration: 60
    environment:
      flutter: 3.24.5
      java: 17
 
    scripts:
      - name: Create Flutter project structure
        script: |
          flutter create --project-name robocar_controller --org com.example --platforms android .
 
      - name: Get Flutter packages
        script: flutter pub get
 
      - name: Build APK
        script: flutter build apk --release
 
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
 
    publishing:
      email:
        recipients:
          - mohammedahmedy92019@gmail.com
        notify:
          success: true
          failure: true
